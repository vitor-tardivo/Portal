<body>
    <div id="barLoading"></div><!-- LOADING BAR -->

    <abbr title="Ajuda"><a id="help" href="multiLinkPage002.html" target="_blank">❗️</a></abbr><!-- HELP PAGE -->

    <abbr title="Ir ao topo da pagina"><button id="scrollT" onclick="topScroll()">&#9650;</button></abbr><!-- BUTTON GO TO THE TOP OF THE PAGE -->

    <header>
        <abbr title="Pagina principal Portal"><a id="home" href="../index.html" target="_self"><stronger>HOME</stronger></a></abbr><!-- HOME PAGE -->

        </nav>
    </header>

    <main>
        <abbr title="Abre os multiplos links"><button id="open" onclick="openLinks()"><stronger>ABRIR</stronger></button></abbr><!-- BUTTON OPEN THE PASTED LINKS -->

        
        <div id="container">
            <abbr title="Mensagem"><p id="message">...</p></abbr><!-- MESSAGE -->

            <abbr title="Cole seus Links aqui"><textarea id="pasteLinks" rows="10" placeholder="Cole seus Links aqui" onclick="showInicialMessage()"></textarea></abbr><!-- PASTE AREA -->
            
            <abbr title="Lista dos links colados"><p id="titleLinks">Lista Links</p></abbr>
            
            <aside><!-- SHOW LINKS AREA -->
                <ul id="listLinks">
                    <!-- LIST LINKS PASTED -->
                </ul>
            </aside>
        </div>

        <div>
            <abbr class="abbrS" title="Apaga todos os links da lista"><button id="erase" class="butao" onclick="eraseListLinks()">Apagar</button></abbr><!-- BUTTON ERASE ITENS OF THE LIST LINKS -->
        </div>
    </main>

    <footer>
